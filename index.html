<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scripture Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#060a14;--bg-primary:#0a0f1e;--bg-secondary:#111832;--bg-card:#161e3a;--bg-card-hover:#1c2648;
  --gold:#caa328;--gold-light:#e8d15a;--gold-dim:#7a6518;--gold-glow:rgba(202,163,40,.25);
  --text-primary:#e8e0d0;--text-secondary:#a09880;--text-muted:#605848;
  --success:#2dd47a;--success-bg:rgba(45,212,122,.12);--success-border:rgba(45,212,122,.35);
  --error:#f04848;--error-bg:rgba(240,72,72,.12);--error-border:rgba(240,72,72,.35);
  --border:rgba(202,163,40,.1);--border-active:rgba(202,163,40,.35);
  --font-display:'Cinzel',serif;--font-verse:'Spectral',serif;--font-ui:'Manrope',sans-serif;
  --radius:12px;--radius-sm:8px;--radius-pill:50px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-ui);background:var(--bg-deep);color:var(--text-primary);-webkit-tap-highlight-color:transparent}
#app{height:100%;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;
  background:linear-gradient(170deg,var(--bg-deep) 0%,#0c1228 40%,#0e1430 70%,var(--bg-deep) 100%)}
.bg-pattern{position:fixed;inset:0;pointer-events:none;opacity:.03;
  background-image:radial-gradient(circle at 20% 30%,var(--gold) 1px,transparent 1px),
  radial-gradient(circle at 80% 70%,var(--gold) 1px,transparent 1px);
  background-size:60px 60px,80px 80px}

#app::-webkit-scrollbar{width:4px}
#app::-webkit-scrollbar-track{background:transparent}
#app::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px}

.screen{display:none;padding:20px 16px 40px;max-width:480px;margin:0 auto;min-height:100%;position:relative}
.screen.active{display:flex;flex-direction:column;animation:fadeIn .4s ease}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-6px)}30%,60%,90%{transform:translateX(6px)}}
@keyframes glow{0%{box-shadow:0 0 5px var(--gold-glow)}50%{box-shadow:0 0 20px var(--gold-glow),0 0 40px rgba(202,163,40,.1)}100%{box-shadow:0 0 5px var(--gold-glow)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
@keyframes confettiDrop{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(calc(100vh)) rotate(720deg);opacity:0}}
@keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

.app-icon{font-size:28px;color:var(--gold);margin-bottom:4px;filter:drop-shadow(0 0 8px var(--gold-glow))}
.app-title{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--gold-light);
  letter-spacing:3px;text-transform:uppercase;line-height:1.2;text-shadow:0 0 30px var(--gold-glow)}
.app-subtitle{font-family:var(--font-verse);font-style:italic;color:var(--text-secondary);font-size:14px;margin-top:4px}

.stats-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:20px 0}
.level-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.level-badge{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--gold-light)}
.level-badge .icon{font-size:22px}
.xp-text{font-size:12px;color:var(--text-secondary);font-weight:500}
.xp-bar-bg{height:6px;background:var(--bg-deep);border-radius:3px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-light));
  border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.stats-row{display:flex;gap:12px;margin-top:12px}
.stat-item{flex:1;text-align:center;padding:8px 4px;background:var(--bg-secondary);border-radius:var(--radius-sm)}
.stat-value{font-size:18px;font-weight:700;color:var(--text-primary)}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.pill-group{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.pill{font-family:var(--font-ui);font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius-pill);
  border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;
  transition:all .25s ease;white-space:nowrap;user-select:none;-webkit-user-select:none}
.pill:hover{border-color:var(--border-active);color:var(--text-primary);background:var(--bg-card-hover)}
.pill.active{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0a0f1e;
  border-color:var(--gold);box-shadow:0 0 16px var(--gold-glow);font-weight:700}
.pill.small{font-size:12px;padding:7px 14px}

.btn{font-family:var(--font-ui);font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;
  padding:14px 28px;font-size:16px;transition:all .25s ease;text-transform:uppercase;letter-spacing:1px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;user-select:none;-webkit-user-select:none}
.btn-primary{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0a0f1e;
  box-shadow:0 4px 20px var(--gold-glow)}
.btn-primary:hover{box-shadow:0 4px 30px rgba(202,163,40,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--bg-card);color:var(--text-primary);border:1.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-active);background:var(--bg-card-hover)}
.btn-sm{padding:10px 18px;font-size:13px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-full{width:100%}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-glow{animation:glow 3s ease-in-out infinite}

.verse-card{position:relative;background:linear-gradient(135deg,var(--bg-card),var(--bg-secondary));
  border:1px solid var(--border-active);border-radius:var(--radius);padding:28px 24px 24px;margin:16px 0}
.verse-card::before{content:'\201C';position:absolute;top:-8px;left:16px;font-family:var(--font-verse);
  font-size:64px;color:var(--gold-dim);line-height:1;opacity:.6}
.verse-text{font-family:var(--font-verse);font-size:18px;line-height:1.7;color:var(--text-primary);
  position:relative;z-index:1}
.verse-ref{font-family:var(--font-ui);font-size:12px;color:var(--gold);font-weight:600;
  margin-top:12px;letter-spacing:1px;text-transform:uppercase}

.game-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back-btn{background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;
  padding:8px;border-radius:50%;transition:all .2s}
.back-btn:hover{color:var(--gold);background:var(--bg-card)}
.game-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--gold-light)}
.step-indicator{display:flex;gap:6px;margin:12px 0 20px;justify-content:center}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);transition:all .3s}
.step-dot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold-glow)}
.step-dot.done{background:var(--success);border-color:var(--success)}
.step-dot.wrong{background:var(--error);border-color:var(--error)}

.question-label{font-family:var(--font-display);font-size:15px;color:var(--gold);margin-bottom:12px;
  text-align:center;letter-spacing:1px}
.question-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:16px}

.options-grid{display:flex;flex-direction:column;gap:10px}
.option-btn{font-family:var(--font-ui);font-size:15px;padding:14px 18px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;
  transition:all .2s ease;text-align:left;line-height:1.5;display:flex;align-items:flex-start;gap:10px;
  word-break:break-word}
.option-btn:hover{border-color:var(--border-active);background:var(--bg-card-hover)}
.option-btn .opt-letter{min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:var(--bg-secondary);font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0}
.option-btn.correct{border-color:var(--success-border);background:var(--success-bg);color:var(--success)}
.option-btn.correct .opt-letter{background:var(--success);color:#0a0f1e}
.option-btn.wrong{border-color:var(--error-border);background:var(--error-bg);color:var(--error);animation:shake .4s ease}
.option-btn.wrong .opt-letter{background:var(--error);color:#fff}
.option-btn.eliminated{opacity:.25;pointer-events:none;transform:scale(.97)}
.option-btn:disabled{cursor:not-allowed}

.options-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.input-wrap{position:relative;margin-bottom:12px}
.input-field{width:100%;font-family:var(--font-ui);font-size:16px;padding:14px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);outline:none;
  transition:border-color .2s}
.input-field:focus{border-color:var(--gold)}
.input-field::placeholder{color:var(--text-muted)}
textarea.input-field{min-height:120px;resize:vertical;line-height:1.6;font-family:var(--font-verse)}

.search-dropdown{position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;
  background:var(--bg-card);border:1px solid var(--border-active);border-radius:var(--radius-sm);
  margin-top:4px;z-index:10;display:none}
.search-dropdown.open{display:block}
.search-item{padding:10px 16px;cursor:pointer;font-size:14px;color:var(--text-primary);
  transition:background .15s;border-bottom:1px solid var(--border)}
.search-item:hover,.search-item.highlighted{background:var(--bg-card-hover);color:var(--gold-light)}
.search-item:last-child{border-bottom:none}

.hints-row{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.hint-btn{font-size:12px;padding:6px 14px;border-radius:var(--radius-pill);border:1px solid var(--border);
  background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;transition:all .2s;
  font-family:var(--font-ui);font-weight:600}
.hint-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.hint-btn.used{border-color:var(--gold-dim);color:var(--gold);background:rgba(202,163,40,.08)}
.hint-btn:disabled{opacity:.3;cursor:not-allowed}
.hint-reveal{font-size:13px;color:var(--gold);text-align:center;margin:8px 0;animation:slideUp .3s ease;
  font-family:var(--font-verse);font-style:italic}

.compare-block{padding:16px;background:var(--bg-secondary);border-radius:var(--radius-sm);margin:12px 0;line-height:1.8}
.compare-block .word-correct{color:var(--success);font-weight:500}
.compare-block .word-wrong{color:var(--error);text-decoration:line-through;opacity:.7}
.compare-block .word-missing{color:var(--error);opacity:.5;font-style:italic}
.accuracy-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-pill);
  font-weight:700;font-size:14px;margin:12px auto;text-align:center}
.accuracy-badge.high{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.accuracy-badge.med{background:rgba(234,179,8,.12);color:#eab308;border:1px solid rgba(234,179,8,.35)}
.accuracy-badge.low{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:20px}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 0.8s linear infinite}
.loading-text{font-family:var(--font-verse);font-style:italic;color:var(--text-secondary);font-size:15px;text-align:center}
.loading-sub{font-size:12px;color:var(--text-muted);text-align:center}

.feedback{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--radius-pill);
  font-weight:700;font-size:14px;z-index:100;animation:slideUp .3s ease;pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,.4)}
.feedback.correct{background:var(--success);color:#0a0f1e}
.feedback.wrong{background:var(--error);color:#fff}

.xp-float{position:fixed;font-family:var(--font-display);font-weight:700;color:var(--gold-light);font-size:18px;
  z-index:100;pointer-events:none;animation:floatUp 1.2s ease forwards;
  text-shadow:0 0 10px var(--gold-glow)}

.level-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:rgba(6,10,20,.9);animation:fadeIn .4s ease}
.level-card{text-align:center;animation:scaleIn .5s cubic-bezier(.175,.885,.32,1.275);padding:40px 30px}
.level-card .new-level-icon{font-size:60px;margin-bottom:16px;filter:drop-shadow(0 0 20px var(--gold-glow))}
.level-card h2{font-family:var(--font-display);font-size:24px;color:var(--gold-light);margin-bottom:8px}
.level-card p{color:var(--text-secondary);font-size:14px;margin-bottom:24px}

.confetti-piece{position:fixed;top:-10px;width:8px;height:8px;z-index:201;pointer-events:none;
  animation:confettiDrop 2.5s ease-in forwards}

.result-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;
  border-bottom:1px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-label{font-size:14px;color:var(--text-secondary)}
.result-value{font-weight:700;font-size:14px}
.result-value.correct{color:var(--success)}
.result-value.wrong{color:var(--error)}
.xp-breakdown{margin-top:12px}
.xp-line{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:var(--text-secondary)}
.xp-line .amount{color:var(--gold-light);font-weight:700}
.xp-total{display:flex;justify-content:space-between;padding:8px 0;font-size:16px;font-weight:700;
  color:var(--gold-light);border-top:1px solid var(--border-active);margin-top:4px}

.modal-overlay{position:fixed;inset:0;z-index:150;background:rgba(6,10,20,.85);
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal-box{background:var(--bg-card);border:1px solid var(--border-active);border-radius:var(--radius);
  padding:24px;max-width:360px;width:100%;animation:scaleIn .3s ease}
.modal-box h3{font-family:var(--font-display);font-size:16px;color:var(--gold-light);margin-bottom:12px}
.modal-box p{font-size:14px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px}

.diff-label{font-size:11px;padding:3px 8px;border-radius:var(--radius-pill);font-weight:700;letter-spacing:.5px}
.diff-easy{background:rgba(45,212,122,.15);color:var(--success)}
.diff-med{background:rgba(234,179,8,.15);color:#eab308}
.diff-hard{background:rgba(240,72,72,.15);color:var(--error)}

.section-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;
  font-weight:700;margin-bottom:8px;text-align:center}

.verse-option{padding:16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:var(--bg-card);cursor:pointer;transition:all .2s;margin-bottom:10px}
.verse-option:hover{border-color:var(--border-active);background:var(--bg-card-hover)}
.verse-option .vo-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:6px}
.verse-option .vo-text{font-family:var(--font-verse);font-size:15px;line-height:1.6;color:var(--text-primary)}
.verse-option.correct{border-color:var(--success-border);background:var(--success-bg)}
.verse-option.correct .vo-label{color:var(--success)}
.verse-option.wrong{border-color:var(--error-border);background:var(--error-bg);animation:shake .4s}
.verse-option.wrong .vo-label{color:var(--error)}

.error-card{background:var(--error-bg);border:1px solid var(--error-border);border-radius:var(--radius);
  padding:20px;text-align:center;margin:20px 0}
.error-card h3{color:var(--error);font-family:var(--font-display);margin-bottom:8px}
.error-card p{color:var(--text-secondary);font-size:14px;margin-bottom:16px}

@media(max-width:380px){
  .app-title{font-size:22px;letter-spacing:2px}
  .pill{padding:8px 14px;font-size:13px}
  .verse-text{font-size:16px}
}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="app">

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div style="text-align:center;padding-top:24px">
    <div class="app-icon"><i class="fa-solid fa-book-bible"></i></div>
    <h1 class="app-title">Scripture Quest</h1>
    <p class="app-subtitle">"Thy word is a lamp unto my feet"</p>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="level-row">
      <div class="level-badge"><span class="icon" id="level-icon"></span><span id="level-name"></span></div>
      <div class="xp-text"><span id="xp-current"></span> / <span id="xp-next"></span> XP</div>
    </div>
    <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-bar"></div></div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-value" id="stat-played">0</div><div class="stat-label">Played</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-accuracy">0%</div><div class="stat-label">Accuracy</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-streak">0 <span style="font-size:14px">🔥</span></div><div class="stat-label">Streak</div></div>
    </div>
  </div>

  <div class="section-label">Choose Your Challenge</div>
  <div class="pill-group" id="game-pills">
    <button class="pill" data-game="detective" onclick="selectGame('detective')">
      <i class="fa-solid fa-magnifying-glass" style="margin-right:4px"></i> Verse Detective
    </button>
    <button class="pill" data-game="neighbor" onclick="selectGame('neighbor')">
      <i class="fa-solid fa-arrows-left-right" style="margin-right:4px"></i> Verse Neighbor
    </button>
  </div>

  <div id="difficulty-section" style="display:none">
    <div class="section-label" style="margin-top:4px">Difficulty</div>
    <div class="pill-group" id="diff-pills">
      <button class="pill small" data-diff="easy" onclick="selectDiff('easy')">
        <span class="diff-label diff-easy">Easy</span>
      </button>
      <button class="pill small" data-diff="medium" onclick="selectDiff('medium')">
        <span class="diff-label diff-med">Medium</span>
      </button>
      <button class="pill small" data-diff="veryhard" onclick="selectDiff('veryhard')">
        <span class="diff-label diff-hard">Very Hard</span>
      </button>
    </div>
  </div>

  <div style="flex:1"></div>
  <button class="btn btn-primary btn-full" id="start-btn" onclick="startGame()" disabled>
    <i class="fa-solid fa-play"></i> Begin
  </button>
  <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:12px">
    Live verses from bible-api.com (WEB translation) &middot; Scores saved locally
  </p>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="game-title" id="game-title"></div>
    <div style="flex:1"></div>
    <div id="game-score-mini" style="font-size:13px;color:var(--gold);font-weight:700"></div>
  </div>
  <div id="step-indicator" class="step-indicator"></div>
  <div id="game-content"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div style="text-align:center;padding-top:20px">
    <div id="results-icon" style="font-size:48px;margin-bottom:12px"></div>
    <h2 style="font-family:var(--font-display);font-size:20px;color:var(--gold-light)" id="results-title"></h2>
    <p style="font-size:14px;color:var(--text-secondary);margin-top:4px" id="results-sub"></p>
  </div>
  <div class="card" style="margin-top:20px" id="results-breakdown"></div>
  <div class="card" id="results-xp"></div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button class="btn btn-secondary" style="flex:1" onclick="goHome()"><i class="fa-solid fa-house"></i> Menu</button>
    <button class="btn btn-primary" style="flex:1" onclick="playAgain()"><i class="fa-solid fa-rotate-right"></i> Next</button>
  </div>
</div>

</div>

<script>

// ===================== BIBLE API =====================
// bible-api.com supports: KJV, WEB, ASV, BBE, DARBY, YLT, WEBSTER, RWV, OEBCW, OEBUS
const TRANSLATION = 'web';

async function fetchVerse(book, chapter, verse) {
  const ref = encodeURIComponent(`${book} ${chapter}:${verse}`);
  const url = `https://bible-api.com/${ref}?translation=${TRANSLATION}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  // verse_text comes with a trailing newline sometimes
  return data.text.replace(/\n+/g, ' ').trim();
}

async function fetchPassage(book, chapter, verseStart, verseEnd) {
  const ref = encodeURIComponent(`${book} ${chapter}:${verseStart}-${verseEnd}`);
  const url = `https://bible-api.com/${ref}?translation=${TRANSLATION}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  // Returns array of verses
  if (data.verses && Array.isArray(data.verses)) {
    return data.verses.map(v => ({
      verse: v.verse,
      text: v.text.replace(/\n+/g, ' ').trim()
    }));
  }
  return [{ verse: verseStart, text: data.text.replace(/\n+/g, ' ').trim() }];
}

// Fetch a wrong verse text (for distractors)
async function fetchWrongVerse(book, chapter, verse) {
  try {
    return await fetchVerse(book, chapter, verse);
  } catch {
    return null;
  }
}

function getLevel(xp) {
  let lvl = LEVELS[0];
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].xp) { lvl = LEVELS[i]; break; }
  }
  const idx = LEVELS.indexOf(lvl);
  const nextLvl = idx < LEVELS.length - 1 ? LEVELS[idx + 1] : null;
  const progress = nextLvl ? (xp - lvl.xp) / (nextLvl.xp - lvl.xp) : 1;
  return { ...lvl, index: idx, nextXp: nextLvl ? nextLvl.xp : lvl.xp, progress: Math.min(1, progress) };
}

function addXP(amount) {
  const oldLevel = getLevel(state.xp);
  state.xp += amount;
  const newLevel = getLevel(state.xp);
  updateStats();
  saveToStorage();
  if (newLevel.index > oldLevel.index) {
    setTimeout(() => showLevelUp(newLevel), 600);
  }
  if (amount > 0) showXPFloat(amount);
}

// ===================== START GAME =====================
async function startGame() {
  showScreen('game');
  state.roundXP = 0;
  state.roundBreakdown = [];
  state.roundResults = [];
  state.g2HintsUsed = 0;
  state.g2Answered = false;

  // Pick a random verse from the pool
  const poolEntry = VERSE_POOL[Math.floor(Math.random() * VERSE_POOL.length)];

  if (state.selectedGame === 'detective') {
    document.getElementById('game-title').textContent = 'Verse Detective';
    document.getElementById('game-score-mini').textContent = '';
    state.g1Step = 0;
    state.g1Attempt = 0;

    showLoading('Fetching verse…');
    renderG1Steps();

    try {
      const verseText = await fetchVerse(poolEntry.book, poolEntry.chapter, poolEntry.verse);
      // Build wrong options for book/chapter/verse
      const wrongChapters = generateWrongNumbers(poolEntry.chapter, 4, 1, 50);
      const wrongVerses = generateWrongNumbers(poolEntry.verse, 4, 1, 40);

      state.currentData = {
        verse_text: verseText,
        testament: poolEntry.testament,
        book: poolEntry.book,
        chapter: poolEntry.chapter,
        verse: poolEntry.verse,
        wrong_books: poolEntry.wrongBooks,
        wrong_chapters: wrongChapters,
        wrong_verses: wrongVerses,
      };
      renderDetectiveStep();
    } catch (err) {
      showApiError(err, startGame);
    }

  } else if (state.selectedGame === 'neighbor') {
    const diff = state.selectedDiff;
    const diffLabels = { easy: 'Easy', medium: 'Medium', veryhard: 'Very Hard' };
    document.getElementById('game-title').textContent = 'Verse Neighbor — ' + diffLabels[diff];
    document.getElementById('game-score-mini').textContent = '';
    document.getElementById('step-indicator').innerHTML = '';

    showLoading('Fetching passage…');

    try {
      // Fetch main verse + adjacent verses (prev and next)
      const verseNum = poolEntry.verse;
      const chap = poolEntry.chapter;
      const book = poolEntry.book;

      // Fetch a range: prev, current, next
      const startV = Math.max(1, verseNum - 1);
      const endV = verseNum + 1;
      let passages;
      try {
        passages = await fetchPassage(book, chap, startV, endV);
      } catch {
        // fallback: just fetch current
        const txt = await fetchVerse(book, chap, verseNum);
        passages = [{ verse: verseNum, text: txt }];
      }

      const mainEntry = passages.find(p => p.verse === verseNum);
      const prevEntry = passages.find(p => p.verse === verseNum - 1);
      const nextEntry = passages.find(p => p.verse === verseNum + 1);

      const verseText = mainEntry ? mainEntry.text : (await fetchVerse(book, chap, verseNum));
      const adjacentNext = nextEntry ? nextEntry.text : null;
      const adjacentPrev = prevEntry ? prevEntry.text : null;

      // Build wrong verse texts for distractors
      let wrongTexts = [];
      if (diff === 'medium' || diff === 'easy') {
        wrongTexts = await fetchMultipleWrongVerses(poolEntry, 3);
      }

      state.currentData = {
        verse_text: verseText,
        book,
        chapter: chap,
        verse: verseNum,
        testament: poolEntry.testament,
        adjacent_next: adjacentNext,
        adjacent_prev: adjacentPrev,
        adjacent_verse: verseNum + 1,
        direction: 'next',
        hint_context: `From ${book} — look for context about this passage.`,
        wrong_options: wrongTexts,
        correct_answer: adjacentNext,
      };

      if (!adjacentNext && diff !== 'detective') {
        // If we couldn't get adjacent verse, fallback gracefully
        state.currentData.adjacent_next = '(Could not load adjacent verse)';
        state.currentData.correct_answer = '(Could not load adjacent verse)';
      }

      if (diff === 'veryhard') {
        initNeighborVHard(state.currentData);
      } else if (diff === 'medium') {
        initNeighborMedium(state.currentData);
      } else {
        initNeighborEasy(state.currentData);
      }
    } catch (err) {
      showApiError(err, startGame);
    }
  }
}

// ===================== FETCH WRONG VERSE DISTRACTORS =====================
async function fetchMultipleWrongVerses(poolEntry, count) {
  // Pick random entries from pool that differ from this one
  const otherEntries = VERSE_POOL.filter(e =>
    !(e.book === poolEntry.book && e.chapter === poolEntry.chapter && e.verse === poolEntry.verse)
  );
  shuffleArray(otherEntries);
  const picks = otherEntries.slice(0, count + 2); // fetch a few extra in case some fail

  const results = [];
  for (const pick of picks) {
    if (results.length >= count) break;
    try {
      // Fetch the adjacent (next) verse for each distractor
      const nextVerse = pick.verse + 1;
      const txt = await fetchVerse(pick.book, pick.chapter, nextVerse);
      if (txt && txt.length > 10) results.push(txt);
    } catch {
      // skip failed fetches
    }
  }

  // If not enough, fill with plausible-sounding wrong verses from different books
  if (results.length < count) {
    const fallbackEntries = otherEntries.slice(count + 2);
    for (const pick of fallbackEntries) {
      if (results.length >= count) break;
      try {
        const txt = await fetchVerse(pick.book, pick.chapter, pick.verse);
        if (txt && txt.length > 10) results.push(txt);
      } catch {}
    }
  }

  return results.slice(0, count);
}

// ===================== NUMBER GENERATION =====================
function generateWrongNumbers(correct, count, min, max) {
  const nums = new Set();
  let attempts = 0;
  while (nums.size < count && attempts < 100) {
    attempts++;
    const n = Math.floor(Math.random() * (max - min + 1)) + min;
    if (n !== correct) nums.add(n);
  }
  return [...nums];
}

// ===================== GAME 1: VERSE DETECTIVE =====================
function renderG1Steps() {
  const steps = ['Testament', 'Book', 'Chapter', 'Verse'];
  document.getElementById('step-indicator').innerHTML = steps.map((_, i) => {
    let cls = 'step-dot';
    if (i < state.g1Step) {
      const res = state.roundResults[i];
      cls += res && res.firstTry ? ' done' : ' wrong';
    } else if (i === state.g1Step) {
      cls += ' active';
    }
    return `<div class="${cls}"></div>`;
  }).join('');
}

function initDetectiveRound(data) {
  state.g1Step = 0;
  state.g1Attempt = 0;
  renderG1Steps();
  renderDetectiveStep();
}

function renderDetectiveStep() {
  const data = state.currentData;
  const gc = document.getElementById('game-content');
  renderG1Steps();

  if (state.g1Step === 0) {
    gc.innerHTML = `
      <div class="verse-card card-glow"><div class="verse-text">${escHtml(data.verse_text)}</div></div>
      <div class="question-label">Which Testament?</div>
      <div class="options-row">
        <button class="option-btn" onclick="guessTestament('Old')" id="opt-old">
          <span class="opt-letter">O</span><span>Old Testament</span></button>
        <button class="option-btn" onclick="guessTestament('New')" id="opt-new">
          <span class="opt-letter">N</span><span>New Testament</span></button>
      </div>`;
  } else if (state.g1Step === 1) {
    renderBookStep();
  } else if (state.g1Step === 2) {
    renderNumberStep('chapter');
  } else if (state.g1Step === 3) {
    renderNumberStep('verse');
  } else {
    finishDetective();
  }
}

function guessTestament(guess) {
  const correct = state.currentData.testament;
  const isCorrect = guess.toLowerCase() === correct.toLowerCase();
  document.getElementById('opt-old').disabled = true;
  document.getElementById('opt-new').disabled = true;
  if (isCorrect) {
    document.getElementById('opt-' + guess.toLowerCase()).classList.add('correct');
    state.roundResults[0] = { firstTry: true, correct: true };
    state.roundBreakdown.push({ label: 'Testament', xp: 10 });
    state.roundXP += 10;
    state.correctAnswers++;
  } else {
    document.getElementById('opt-' + guess.toLowerCase()).classList.add('wrong');
    document.getElementById('opt-' + correct.toLowerCase()).classList.add('correct');
    state.roundResults[0] = { firstTry: false, correct: false };
  }
  state.totalAnswers++;
  showFeedback(isCorrect);
  setTimeout(() => {
    state.g1Step = 1;
    state.g1Attempt = 0;
    renderDetectiveStep();
  }, 1200);
}

function renderBookStep() {
  const data = state.currentData;
  const gc = document.getElementById('game-content');
  const testament = data.testament;
  const books = testament.toLowerCase() === 'old' ? OT_BOOKS : NT_BOOKS;

  if (state.g1Attempt === 0) {
    gc.innerHTML = `
      <div class="verse-card"><div class="verse-text">${escHtml(data.verse_text)}</div>
        <div class="verse-ref">${testament} Testament</div></div>
      <div class="question-label">Which Book?</div>
      <div class="question-sub">Type to search ${testament} Testament books</div>
      <div class="input-wrap">
        <input type="text" class="input-field" id="book-input" placeholder="Start typing a book name…"
          autocomplete="off" oninput="filterBooks()" onfocus="filterBooks()">
        <div class="search-dropdown" id="book-dropdown"></div>
      </div>
      <button class="btn btn-primary btn-full" id="book-submit-btn" onclick="submitBook()" disabled>Submit</button>`;
    populateBookDropdown(books);
  } else {
    renderBookChoices();
  }
}

let selectedBook = '';

function populateBookDropdown(books) {
  const dd = document.getElementById('book-dropdown');
  dd.innerHTML = books.map(b => `<div class="search-item" onclick="pickBook('${escAttr(b)}')">${b}</div>`).join('');
}

function filterBooks() {
  const input = document.getElementById('book-input');
  const dd = document.getElementById('book-dropdown');
  const val = input.value.toLowerCase().trim();
  const testament = state.currentData.testament;
  const books = testament.toLowerCase() === 'old' ? OT_BOOKS : NT_BOOKS;
  const filtered = val ? books.filter(b => b.toLowerCase().includes(val)) : books;
  dd.innerHTML = filtered.map(b => `<div class="search-item" onclick="pickBook('${escAttr(b)}')">${b}</div>`).join('');
  dd.classList.toggle('open', filtered.length > 0 && document.activeElement === input);
  if (val && !books.some(b => b.toLowerCase() === val)) {
    selectedBook = '';
    document.getElementById('book-submit-btn').disabled = true;
  }
}

function pickBook(name) {
  document.getElementById('book-input').value = name;
  document.getElementById('book-dropdown').classList.remove('open');
  selectedBook = name;
  document.getElementById('book-submit-btn').disabled = false;
}

function submitBook() {
  if (!selectedBook) return;
  const correct = state.currentData.book;
  const isCorrect = selectedBook.toLowerCase() === correct.toLowerCase();
  if (isCorrect) {
    state.roundResults[1] = { firstTry: true, correct: true };
    state.roundBreakdown.push({ label: 'Book (1st try)', xp: 50 });
    state.roundXP += 50;
    state.correctAnswers++;
    state.totalAnswers++;
    showFeedback(true);
    setTimeout(() => { state.g1Step = 2; state.g1Attempt = 0; renderDetectiveStep(); }, 1000);
  } else {
    state.g1Attempt = 1;
    state.totalAnswers++;
    showFeedback(false);
    state.g2MediumOptions = buildOptions(correct, state.currentData.wrong_books, 5);
    setTimeout(() => renderBookChoices(), 800);
  }
}

function renderBookChoices() {
  const data = state.currentData;
  const gc = document.getElementById('game-content');
  const opts = state.g2MediumOptions;
  gc.innerHTML = `
    <div class="verse-card"><div class="verse-text">${escHtml(data.verse_text)}</div>

}

function renderNumberStep(type) {

function submitNumber(type) {

    state.roundXP += xp;
    state.correctAnswers++;
    state.totalAnswers++;
    showFeedback(true);
    setTimeout(() => { state.g1Step = stepIdx + 1; state.g1Attempt = 0; renderDetectiveStep(); }, 1000);

    document.getElementById('nopt-' + idx).classList.add('wrong');

function finishDetective() {
  const data = state.currentData;
  const allFirst = state.roundResults.every(r => r && r.firstTry);
  if (allFirst) {
    state.roundBreakdown.push({ label: 'Perfect Round Bonus', xp: 50 });
    state.roundXP += 50;
  }
  if (allFirst) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const streakBonus = Math.min(state.streak * 5, 50);
    if (streakBonus > 0) {
      state.roundBreakdown.push({ label: `Streak Bonus (×${state.streak})`, xp: streakBonus });
      state.roundXP += streakBonus;
    }
  } else {
    state.streak = 0;
  }
  state.gamesPlayed++;
  addXP(state.roundXP);
  showResults('detective', data);
}

function initNeighborVHard(data) {
  state.g2HintsUsed = 0;

  if (!data.adjacent_next || data.adjacent_next.startsWith('(Could not')) {

function useVHardHint(num) {
  const data = state.currentData;
  state.g2HintsUsed = Math.max(state.g2HintsUsed, num);
  const display = document.getElementById('vhard-hints-display');
  let hints = '';
  if (state.g2HintsUsed >= 1) {
    hints += `<div class="hint-reveal">Verse ${data.adjacent_verse}</div>`;
    document.getElementById('hint1-btn').classList.add('used');
    document.getElementById('hint1-btn').disabled = true;
    document.getElementById('hint2-btn').disabled = false;
  }
  if (state.g2HintsUsed >= 2) {
    hints += `<div class="hint-reveal">Chapter ${data.chapter}</div>`;
    document.getElementById('hint2-btn').classList.add('used');
    document.getElementById('hint2-btn').disabled = true;
    document.getElementById('hint3-btn').disabled = false;
  }
  if (state.g2HintsUsed >= 3) {
    hints += `<div class="hint-reveal">${data.book}</div>`;
    document.getElementById('hint3-btn').classList.add('used');
    document.getElementById('hint3-btn').disabled = true;
  }
  display.innerHTML = hints;
}

function submitVHard() {
  const userText = document.getElementById('vhard-input').value.trim();
  if (!userText) return;
  state.g2Answered = true;
  const data = state.currentData;
  const correct = data.adjacent_next;
  const result = compareTexts(userText, correct);

  if (result.accuracy < 0.2) {
    showTooHardModal(result, correct);
  } else {
    showVHardResults(result, correct);
  }
}

function showTooHardModal(result, correct) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-box">
      <h3>That was a tough one!</h3>
      <p>Your answer was ${Math.round(result.accuracy * 100)}% accurate. Would you like to see the full results or try an easier difficulty?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="this.closest('.modal-overlay').remove();showVHardResults(window._vhResult,window._vhCorrect)">See Results</button>
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="this.closest('.modal-overlay').remove();state.selectedDiff='medium';startGame()">Try Easier</button>
      </div>
    </div>`;
  window._vhResult = result;
  window._vhCorrect = correct;
  document.body.appendChild(modal);
}

function showVHardResults(result, correct) {
  const data = state.currentData;
  const gc = document.getElementById('game-content');
  const pct = Math.round(result.accuracy * 100);
  const badgeClass = pct >= 80 ? 'high' : pct >= 40 ? 'med' : 'low';

  let xp = 0;
  if (pct >= 80) xp = 100;
  else if (pct >= 50) xp = 50;
  else if (pct >= 20) xp = 20;
  const hintPenalty = state.g2HintsUsed * 10;
  xp = Math.max(0, xp - hintPenalty);

  state.roundXP = xp;
  state.roundBreakdown = [{ label: `Accuracy ${pct}%`, xp: xp + hintPenalty }];
  if (hintPenalty > 0) state.roundBreakdown.push({ label: `Hint penalty (${state.g2HintsUsed} hints)`, xp: -hintPenalty });

  if (pct >= 50) { state.correctAnswers++; state.streak++; if (state.streak > state.bestStreak) state.bestStreak = state.streak; }
  else { state.streak = 0; }
  state.totalAnswers++;
  state.gamesPlayed++;

  gc.innerHTML = `
    <div class="verse-card"><div class="verse-text">${escHtml(data.verse_text)}</div>
      <div class="verse-ref">${data.book} ${data.chapter}:${data.verse}</div></div>
    <div style="text-align:center">
      <div class="accuracy-badge ${badgeClass}"><i class="fa-solid fa-${pct >= 50 ? 'check' : 'xmark'}"></i> ${pct}% Accurate</div>
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:8px">Correct Verse</div>
      <div class="compare-block">${result.correctHtml}</div>
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:8px">Your Answer</div>
      <div class="compare-block">${result.userHtml}</div>
    </div>
    <div class="card xp-breakdown">
      ${state.roundBreakdown.map(b => `<div class="xp-line"><span>${b.label}</span><span class="amount">${b.xp >= 0 ? '+' : ''}${b.xp}</span></div>`).join('')}
      <div class="xp-total"><span>Total</span><span>+${state.roundXP} XP</span></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-secondary" style="flex:1" onclick="goHome()"><i class="fa-solid fa-house"></i> Menu</button>
      <button class="btn btn-primary" style="flex:1" onclick="playAgain()"><i class="fa-solid fa-rotate-right"></i> Next</button>
    </div>`;
  addXP(state.roundXP);
}

function initNeighborMedium(data) {
  state.g2HintsUsed = 0;
  state.g2Answered = false;

  if (!data.correct_answer || data.correct_answer.startsWith('(Could not')) {
    document.getElementById('game-content').innerHTML = `<div class="error-card">
      <h3>Adjacent verse unavailable</h3>
      <p>Could not load the next verse for this passage. Try a different one.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-secondary btn-sm" onclick="goHome()">Back</button>
        <button class="btn btn-primary btn-sm" onclick="startGame()">Try Again</button>
      </div>
    </div>`;
    return;
  }

  // Build options: correct + up to 3 wrong. Pad with generic fallbacks if needed.
  let wrongOpts = (data.wrong_options || []).filter(t => t && t !== data.correct_answer);
  while (wrongOpts.length < 3) {
    wrongOpts.push(`(Option ${wrongOpts.length + 2} unavailable)`);
  }
  wrongOpts = wrongOpts.slice(0, 3);

  const options = shuffleArray([data.correct_answer, ...wrongOpts]);
  state.g2MediumOptions = options.map(o => ({
    value: o,
    eliminated: false,
    isCorrect: o === data.correct_answer
  }));

  renderMediumQuestion();
}

function initNeighborEasy(data) {
  state.g2HintsUsed = 0;
  state.g2Answered = false;

  const hasNext = data.adjacent_next && !data.adjacent_next.startsWith('(Could not');
  const hasPrev = data.adjacent_prev && !data.adjacent_prev.startsWith('(Could not');

  // Use whichever adjacent verses are available
  let realVerse, realDir, fakeVerse;
  if (hasNext) {
    realVerse = data.adjacent_next;
    realDir = 'after';
  } else if (hasPrev) {
    realVerse = data.adjacent_prev;
    realDir = 'before';
  } else {
    document.getElementById('game-content').innerHTML = `<div class="error-card">
      <h3>Adjacent verses unavailable</h3>
      <p>Could not load neighboring verses for this passage. Try again with a different verse.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-secondary btn-sm" onclick="goHome()">Back</button>
        <button class="btn btn-primary btn-sm" onclick="startGame()">Try Again</button>
      </div>
    </div>`;
    return;
  }

  // Fake verse: use a verse from wrong options, or the prev if we're showing next
  const wrongs = data.wrong_options || [];
  fakeVerse = wrongs.length > 0 ? wrongs[0] : 'And they went on their way, giving thanks to the Lord.';

  let beforeText, afterText;
  if (realDir === 'after') {
    beforeText = fakeVerse;
    afterText = realVerse;
  } else {
    beforeText = realVerse;
    afterText = fakeVerse;
  }

  state._easySetup = { beforeText, afterText, realDir };
  renderEasyQuestion();
}

function renderEasyQuestion() {
  const data = state.currentData;
  const s = state._easySetup;
  const gc = document.getElementById('game-content');
  gc.innerHTML = `
    <div class="verse-card card-glow">
      <div class="verse-text">${escHtml(data.verse_text)}</div>
      <div class="verse-ref">${data.book} ${data.chapter}:${data.verse}</div>
    </div>
    <div class="question-label">One is real, one is fake</div>
    <div class="question-sub">Tap the verse you believe is genuine</div>
    <div class="hints-row">
      <button class="hint-btn" id="easy-hint-btn" onclick="useEasyHint()" ${state.g2HintsUsed > 0 ? 'disabled class="hint-btn used"' : ''}>
        <i class="fa-solid fa-lightbulb"></i> Hint: Context</button>
    </div>
    <div id="easy-hint-display"></div>
    <div id="easy-options">
      <div class="verse-option" onclick="guessEasy('before')" id="eopt-before">
        <div class="vo-label"><i class="fa-solid fa-arrow-up"></i> Verse Before</div>
        <div class="vo-text">${escHtml(s.beforeText)}</div>
      </div>
      <div class="verse-option" onclick="guessEasy('after')" id="eopt-after">
        <div class="vo-label"><i class="fa-solid fa-arrow-down"></i> Verse After</div>
        <div class="vo-text">${escHtml(s.afterText)}</div>
      </div>
    </div>`;
  if (state.g2HintsUsed > 0) {
    document.getElementById('easy-hint-display').innerHTML =
      `<div class="hint-reveal">${escHtml(data.hint_context)}</div>`;
  }
}

function useEasyHint() {
  state.g2HintsUsed = 1;
  document.getElementById('easy-hint-btn').classList.add('used');
  document.getElementById('easy-hint-btn').disabled = true;
  document.getElementById('easy-hint-display').innerHTML =
    `<div class="hint-reveal">${escHtml(state.currentData.hint_context)}</div>`;
}

function guessEasy(dir) {
  if (state.g2Answered) return;
  state.g2Answered = true;
  const s = state._easySetup;
  const isCorrect = dir === s.realDir;

  document.getElementById('eopt-' + dir).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) document.getElementById('eopt-' + s.realDir).classList.add('correct');

  const xp = isCorrect ? (state.g2HintsUsed === 0 ? 30 : 20) : 0;
  state.roundXP = xp;
  state.roundBreakdown = [];
  if (isCorrect) {
    state.roundBreakdown.push({ label: 'Correct answer', xp: 30 });
    if (state.g2HintsUsed > 0) state.roundBreakdown.push({ label: 'Hint penalty', xp: -10 });
    state.correctAnswers++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.streak = 0;
  }
  state.totalAnswers++;
  state.gamesPlayed++;
  showFeedback(isCorrect);
  addXP(state.roundXP);
  setTimeout(() => showResults('neighbor-easy', state.currentData), 1400);
}

// ===================== RESULTS =====================
function showResults(gameType, data) {
  showScreen('results');
  const isDetective = gameType === 'detective';
  const bd = document.getElementById('results-breakdown');
  const xpDiv = document.getElementById('results-xp');

  if (isDetective) {
    const allFirst = state.roundResults.every(r => r && r.firstTry);
    document.getElementById('results-icon').textContent = allFirst ? '🏆' : '📖';
    document.getElementById('results-title').textContent = allFirst ? 'Perfect Round!' : 'Round Complete';
    document.getElementById('results-sub').textContent = `${data.book} ${data.chapter}:${data.verse}`;

    const labels = ['Testament', 'Book', 'Chapter', 'Verse'];
    const values = [data.testament, data.book, data.chapter, data.verse];
    bd.innerHTML = labels.map((l, i) => {
      const r = state.roundResults[i];
      const ok = r && r.firstTry;
      return `<div class="result-row"><span class="result-label">${l}</span>
        <span class="result-value ${ok ? 'correct' : 'wrong'}">${ok ? '✓' : '✗'} ${values[i]}${r && r.attempts ? ' (attempt ' + r.attempts + ')' : ''}</span></div>`;
    }).join('');
  } else {
    const isCorrectRound = state.roundXP > 0;
    document.getElementById('results-icon').textContent = isCorrectRound ? '✨' : '📚';
    document.getElementById('results-title').textContent = isCorrectRound ? 'Well Done!' : 'Keep Learning!';
    document.getElementById('results-sub').textContent = `${data.book} ${data.chapter}:${data.verse}`;
    bd.innerHTML = `<div class="verse-card" style="margin:0"><div class="verse-text" style="font-size:15px">${escHtml(data.verse_text)}</div>
      <div class="verse-ref">${data.book} ${data.chapter}:${data.verse} (WEB)</div></div>`;
  }

  xpDiv.innerHTML = `<div class="xp-breakdown">
    ${state.roundBreakdown.map(b => `<div class="xp-line"><span>${b.label}</span><span class="amount">${b.xp >= 0 ? '+' : ''}${b.xp}</span></div>`).join('')}
    <div class="xp-total"><span>Total</span><span>+${state.roundXP} XP</span></div>
  </div>`;
}

// ===================== TEXT COMPARISON =====================
function compareTexts(userText, correctText) {
  const normalize = t => t.toLowerCase().replace(/[^\w\s']/g, '').replace(/\s+/g, ' ').trim();
  const userWords = normalize(userText).split(' ').filter(Boolean);
  const correctWords = normalize(correctText).split(' ').filter(Boolean);

  if (userWords.length === 0 || correctWords.length === 0) {
    return { accuracy: 0, userHtml: escHtml(userText), correctHtml: escHtml(correctText) };
  }

  const m = userWords.length, n = correctWords.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (userWords[i - 1] === correctWords[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
      else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
  }

  const matchedUser = new Set();
  const matchedCorrect = new Set();
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (userWords[i - 1] === correctWords[j - 1]) { matchedUser.add(i - 1); matchedCorrect.add(j - 1); i--; j--; }
    else if (dp[i - 1][j] > dp[i][j - 1]) i--;
    else j--;
  }

  const accuracy = dp[m][n] / Math.max(m, n);
  const origUserWords = userText.replace(/\s+/g, ' ').trim().split(' ');
  const origCorrectWords = correctText.replace(/\s+/g, ' ').trim().split(' ');

  const userHtml = origUserWords.map((w, idx) =>
    idx < userWords.length && matchedUser.has(idx)
      ? `<span class="word-correct">${escHtml(w)}</span>`
      : `<span class="word-wrong">${escHtml(w)}</span>`
  ).join(' ');

  const correctHtml = origCorrectWords.map((w, idx) =>
    idx < correctWords.length && matchedCorrect.has(idx)
      ? `<span class="word-correct">${escHtml(w)}</span>`
      : `<span class="word-missing">${escHtml(w)}</span>`
  ).join(' ');

  return { accuracy, userHtml, correctHtml };
}

// ===================== HELPERS =====================
function buildOptions(correct, wrongValues, count) {
  const wrongArr = (wrongValues || []).slice(0, count - 1);
  const all = [
    { value: correct, eliminated: false, isCorrect: true },
    ...wrongArr.map(v => ({ value: v, eliminated: false, isCorrect: false }))
  ];
  return shuffleArray(all);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escHtml(text) {
  if (text == null) return '';
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function escAttr(text) {
  return String(text).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function showFeedback(isCorrect) {
  const fb = document.createElement('div');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = isCorrect
    ? '<i class="fa-solid fa-check"></i> Correct!'
    : '<i class="fa-solid fa-xmark"></i> Not quite';
  document.body.appendChild(fb);
  setTimeout(() => fb.remove(), 1200);
}

document.addEventListener('click', function(e) {
  const dd = document.getElementById('book-dropdown');
  if (dd && !e.target.closest('.input-wrap')) dd.classList.remove('open');
});

// ===================== PERSIST =====================
const SAVE_KEY = 'sq_save_v2';

function saveToStorage() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      version: 2,
      xp: state.xp,
      gamesPlayed: state.gamesPlayed,
      correctAnswers: state.correctAnswers,
      totalAnswers: state.totalAnswers,
      streak: state.streak,
      bestStreak: state.bestStreak,
    }));
  } catch {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (!s || s.version !== 2) return;
    state.xp = s.xp ?? 0;
    state.gamesPlayed = s.gamesPlayed ?? 0;
    state.correctAnswers = s.correctAnswers ?? 0;
    state.totalAnswers = s.totalAnswers ?? 0;
    state.streak = s.streak ?? 0;
    state.bestStreak = s.bestStreak ?? 0;
  } catch {}
}

window.addEventListener('beforeunload', saveToStorage);
window.addEventListener('pagehide', saveToStorage);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveToStorage();
});

loadFromStorage();
updateStats();
</script>
